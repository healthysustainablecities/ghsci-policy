name: Install Lambda Dependencies

on:
  workflow_dispatch:  
  push:
    branches:
      - main
    paths:
      - 'amplify/functions/process-policy-report/requirements.txt'

jobs:
  install-dependencies:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies for Lambda
        working-directory: amplify/functions/process-policy-report
        run: |
          echo "Installing Python dependencies for Lambda..."
          pip install \
            --target ./lib \
            --platform manylinux2014_x86_64 \
            --implementation cp \
            --python-version 3.13 \
            --only-binary=:all: \
            --upgrade \
            -r requirements.txt
          
          echo "Dependencies installed to lib/ directory"
          ls -la lib/

      - name: Commit and push lib folder
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add amplify/functions/process-policy-report/lib/
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update Lambda dependencies in lib/ [skip ci]"
            git push
          fi
